---
- name: Bootstrap Incus Server
  hosts: incus
  become: true
  vars:
    incus_storage_driver: dir # or zfs/btrfs based on user pref. safe default is dir.
    incus_storage_pool_name: default
    ssh_public_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    # Tailscale Configuration
    tailscale_auth_key: "{{ tailscale_key }}"
    tailscale_args: "--advertise-routes=10.0.100.0/24"
    tailscale_ssh_enabled: true

  roles:
    - ssh_harden
    - automated_updates
    - postfix_relay
    - artis3n.tailscale.tailscale
    - ufw

  tasks:
    - name: Install Incus (and dependencies)
      ansible.builtin.apt:
        name:
          - incus
          - incus-tools
        state: present
        update_cache: yes

    - name: Ensure 'incus-admin' group exists
      ansible.builtin.group:
        name: incus-admin
        state: present

    - name: Add admin user to incus-admin group
      ansible.builtin.user:
        name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
        groups: incus-admin
        append: yes

    - name: Ensure Incus service is started and enabled
      ansible.builtin.service:
        name: incus
        state: started
        enabled: yes

    - name: Initialize Incus Storage Pool (default)
      lxc.incus.incus_storage_pool:
        name: "{{ incus_storage_pool_name }}"
        driver: "{{ incus_storage_driver }}"
        config:
          source: /var/lib/incus/storage-pools/default
        state: present

    - name: Initialize Incus Network (incusbr0)
      lxc.incus.incus_network:
        name: incusbr0
        type: bridge
        config:
          "ipv4.address": "10.0.100.1/24"
          "ipv4.nat": "true"
          "ipv6.address": "none"
        state: present

    - name: Allow Incus API (8443)
      community.general.ufw:
        rule: allow
        port: "8443"
        proto: tcp
        comment: "Remote Terraform Access"

    - name: Allow Traffic on Incus Bridge (DNS/DHCP)
      community.general.ufw:
        rule: allow
        direction: in
        interface: incusbr0
        comment: "Allow container traffic to host (DNS/DHCP)"
