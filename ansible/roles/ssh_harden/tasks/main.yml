### Create admin
- name: Create admin user with a password
  ansible.builtin.user:
    name: admin
    shell: /bin/bash
    groups: sudo
    append: yes
    state: present
    # Hash the plain-text password from the prompt
    password: "{{ admin_password | password_hash('sha512') }}"
    update_password: on_create # only sets it if the user is new

- name: Allow admin user sudo access (requires password)
  ansible.builtin.copy:
    dest: /etc/sudoers.d/admin
    content: "admin ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"

- name: Set up SSH for admin
  ansible.builtin.authorized_key:
    user: admin
    state: present
    key: "{{ ssh_public_key }}"

- name: Switch port
  ansible.builtin.blockinfile:
    path: "/etc/ssh/sshd_config.d/00-user.conf"
    create: true
    marker: "# {mark} ANSIBLE MANAGED SSH CONFIG"
    block: |
      Port {{ ssh_port }}
      PasswordAuthentication no
      PermitRootLogin no
  register: ssh_config

- name: Determine SSH management type
  service_facts:

- name: Restart SSH service (if traditional)
  systemd:
    name: ssh
    state: restarted
    daemon_reload: true
  # Only run if the service is already running and the socket isn't the leader
  when:
    - ansible_facts.services['ssh.service'] is defined
    - ansible_facts.services['ssh.service'].state == 'running'
    - ansible_facts.services['ssh.socket'] is not defined or ansible_facts.services['ssh.socket'].state != 'active'

- name: Restart SSH socket (if socket-activated)
  systemd:
    name: ssh.socket
    state: restarted
    daemon_reload: true
  when:
    - ansible_facts.services['ssh.socket'] is defined
    - ansible_facts.services['ssh.socket'].state == 'active'
