---
- name: Setup Plex VM
  hosts: plex
  become: true
  vars:
    ssh_public_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
  vars_files:
    - /var/homelab.yml

  tasks:
    - name: Ensure media mount point exists
      file:
        path: /mnt/media
        state: directory
        mode: "0755"

    - name: Configure media mount in fstab
      mount:
        path: /mnt/media
        src: media_mount
        fstype: virtiofs
        opts: defaults
        state: mounted

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Create Plex config dir
      file:
        path: /opt/plex/config
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Run Plex container
      community.docker.docker_container:
        name: plex
        image: lscr.io/linuxserver/plex:latest
        restart_policy: unless-stopped
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "UTC"
        network_mode: host
        volumes:
          - /opt/plex/config:/config
          - /mnt/media:/data
