_ssh_defaults: &ssh_defaults
  user: admin
  port: 17031
  private_key_path: ~/.ssh/id_ed25519
  public_key_path: ~/.ssh/id_ed25519.pub

hosts:
  - name: host-01
    ip: 10.0.0.50
    ssh: *ssh_defaults
    auto_update_reboot_time: "05:00"
    wireguard_endpoint: true
    incus:
      storage_pool_name: "incus-storage-pool"
      storage_pool_driver: "FIX-ME"
    vms:
      - name: host-01-vm-01
        ip: 10.0.100.01
        ssh: *ssh_defaults
        auto_update_reboot_time: "05:00"
      - name: host-01-vm-02
        ip: 10.0.100.02
        ssh: *ssh_defaults
        auto_update_reboot_time: "05:00"

  - name: host-02
    ip: 10.0.0.85
    ssh: *ssh_defaults
    auto_update_reboot_time: "05:00"
    wireguard_endpoint: false
    incus:
      storage_pool_name: "incus-storage-pool"
      storage_pool_driver: "FIX-ME"
    vms:
      - name: host-02-vm-01
        ip: 10.0.100.01
        ssh: *ssh_defaults
        auto_update_reboot_time: "05:00"
      - name: host-02-vm-02
        ip: 10.0.100.02
        ssh: *ssh_defaults
        auto_update_reboot_time: "05:00"
